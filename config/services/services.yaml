services:

    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Symfony\Component\DependencyInjection\ContainerInterface: '@service_container'

    ControleOnline\:
        resource: '../../src/*'
        exclude: '../../src/{DependencyInjection,Entity,Resource,Migrations,Library,Message,Tests,Kernel.php}'

    ControleOnline\Repository\:
        resource: '../../src/Repository'
        tags: ['doctrine.repository_service']
        public: true

    ControleOnline\Controller\:
        resource: '../../src/Controller'
        tags: ['controller.service_arguments']
        public: true

    ControleOnline\Command\:
        resource: '../../src/Command'
        tags: ['console.command']
        public: true

    ControleOnline\Filter\:
        resource: '../../src/Filter'
        public: true
    _instanceof:
        ControleOnline\Service\Imports\ImportProcessorInterface:
            tags: ['app.import_processor']
    ControleOnline\Service\Imports\ImportProcessorResolver:
        arguments:
            $processors: !tagged_iterator app.import_processor

    ControleOnline\Listener\DefaultEventListener:
        arguments:
            $container: '@Symfony\Component\DependencyInjection\ContainerInterface'
        tags:
            - { name: 'doctrine.event_listener', event: 'preUpdate' }
            - { name: 'doctrine.event_listener', event: 'prePersist' }
            - { name: 'doctrine.event_listener', event: 'postUpdate' }
            - { name: 'doctrine.event_listener', event: 'postPersist' }
            - { name: 'doctrine.event_listener', event: 'preRemove' }


    ControleOnline\Listener\DefaultEventSubscriber:
        tags:
            - { name: 'doctrine.event_subscriber' }


    ControleOnline\Serializer\ExtraDataNormalizer:
        tags:
            - { name: serializer.normalizer, priority: 1000 }

    ControleOnline\Service\CollectionSummaryService:
        autowire: true
        autoconfigure: false
        arguments:
            $collectionExtensions: !tagged_iterator api_platform.doctrine.orm.query_extension.collection
            $handleLinksLocator: !tagged_locator { tag: 'api_platform.doctrine.orm.links_handler', index_by: 'key' }

    ControleOnline\State\CollectionSummaryProvider:
        autowire: true
        autoconfigure: false
        decorates: 'api_platform.state_provider.security_parameter'
        arguments:
            $inner: '@ControleOnline\State\CollectionSummaryProvider.inner'

    ControleOnline\Serializer\CollectionSummaryNormalizer:
        autowire: true
        autoconfigure: false
        tags:
            - { name: serializer.normalizer, priority: 1100 }
